name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # npm install (not `npm ci`) tolerates cross-platform optional-dependency
        # differences between the macOS-generated lockfile and the Linux runner.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # Baked into the client bundle so uploads authenticate to the ingest API.
          VITE_INGEST_TOKEN: ${{ secrets.VITE_INGEST_TOKEN }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Account IDs are not secret; kept inline so only one GitHub secret is needed.
          accountId: 643d9cb0ebfaddd492541bd8440ce721
          command: pages deploy dist --project-name gandalf --branch main
